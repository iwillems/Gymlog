<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Gymlog</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gymlog">
<meta name="theme-color" content="#000000">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<style>
:root {
  color-scheme: dark;
  --bg-base: #0a0a0c;
  --bg-surface: #14141a;
  --bg-tile: #17171c;
  --bg-tile-active: #22222a;
  --border-subtle: #2a2a30;
  --border-stronger: #3a3a42;
  --text-primary: #ffffff;
  --text-secondary: #88888f;
  --text-tertiary: #5a5a60;
  --text-muted: #3a3a42;
  --accent: #8aa3ff;
  --done-fill: #1e5f3f;
  --done-stroke: #2f8a5e;
  --done-fill-active: #266b48;
  --warn: #ffa940;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", system-ui, sans-serif;
  height: 100%;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  overscroll-behavior: none;
  touch-action: manipulation;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  background:
    radial-gradient(ellipse 90% 55% at 50% 0%, rgba(110, 120, 160, 0.10), transparent 65%),
    radial-gradient(ellipse 70% 45% at 50% 100%, rgba(0, 0, 0, 0.6), transparent 75%),
    var(--bg-base);
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  display: flex;
  flex-direction: column;
}
header {
  text-align: center;
  padding: 20px 0 12px;
  font-family: -apple-system, "SF Pro Display", "Helvetica Neue", "Inter", system-ui, sans-serif;
  font-size: 13px;
  font-weight: 200;
  letter-spacing: 9px;
  text-indent: 9px;
  color: #d8d8e0;
  position: relative;
}
header::after {
  content: '';
  position: absolute;
  left: 50%; bottom: 4px;
  transform: translateX(-50%);
  width: 24px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
}
.stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  padding: 6px 0 10px;
}
svg.floorplan {
  width: 100%;
  height: 100%;
  max-width: 393px;
  display: block;
}
.device { cursor: pointer; }
.device .device-bg {
  transition: fill 180ms ease, stroke 180ms ease;
}
.device:active .device-bg { fill: var(--bg-tile-active); }
.device.done .device-bg { fill: var(--done-fill); stroke: var(--done-stroke); }
.device.done:active .device-bg { fill: var(--done-fill-active); }

/* Refined drop-shadow on icons — gives "lift" without heaviness */
.device > g[transform] {
  filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.55)) drop-shadow(0 3px 6px rgba(0, 0, 0, 0.35));
}

/* Sheets */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  opacity: 0;
  pointer-events: none;
  transition: opacity 220ms ease;
}
.backdrop.open { opacity: 1; pointer-events: auto; }
#picker-backdrop { z-index: 100; }
#picker-sheet    { z-index: 101; }
#history-backdrop{ z-index: 102; }
#history-sheet   { z-index: 103; }

.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.025), transparent 28%),
    var(--bg-surface);
  border-top: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 22px 22px 0 0;
  transform: translateY(100%);
  transition: transform 280ms cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: max(env(safe-area-inset-bottom), 16px);
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 -24px 60px rgba(0, 0, 0, 0.75);
}
.sheet.open { transform: translateY(0); }

.sheet-handle-area {
  padding: 10px 0 4px;
  touch-action: none;
}
.sheet-handle {
  width: 40px; height: 4px;
  background: rgba(255, 255, 255, 0.16);
  border-radius: 2px;
  margin: 0 auto;
}
.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px 6px;
  min-height: 36px;
}
.sheet-title {
  font-size: 17px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: 0.2px;
}
.icon-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.05);
  width: 36px; height: 36px;
  border-radius: 18px;
  color: var(--text-primary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  padding: 0;
}
.icon-btn:active { background: rgba(255, 255, 255, 0.12); }
.icon-btn svg {
  width: 18px; height: 18px;
  stroke: currentColor; fill: none;
  stroke-width: 1.7;
  stroke-linecap: round; stroke-linejoin: round;
}

/* Picker wheels */
.wheels-row {
  display: flex;
  gap: 10px;
  padding: 14px 20px 14px;
}
.wheel-wrap {
  flex: 1;
  text-align: center;
  min-width: 0;
}
.wheel-label {
  font-size: 10px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 2.4px;
  margin-bottom: 12px;
  font-weight: 500;
}
.wheel-container {
  position: relative;
  height: 200px;
  background: rgba(255, 255, 255, 0.022);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 14px;
  overflow: hidden;
  transition: transform 80ms ease-out, box-shadow 80ms ease-out;
}
.wheel-wrap.pulse .wheel-container {
  transform: scale(1.03);
  box-shadow: 0 0 18px rgba(138, 163, 255, 0.18);
}
.wheel-container::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 80px; height: 40px;
  background: rgba(255, 255, 255, 0.03);
  border-top: 1px solid rgba(255, 255, 255, 0.35);
  border-bottom: 1px solid rgba(255, 255, 255, 0.35);
  pointer-events: none;
  z-index: 2;
}

.wheel {
  height: 100%;
  width: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 18%, #000 38%, #000 62%, rgba(0,0,0,0.4) 82%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 18%, #000 38%, #000 62%, rgba(0,0,0,0.4) 82%, transparent 100%);
}
.wheel::-webkit-scrollbar { display: none; }
.wheel-list { padding: 80px 0; }
.wheel-item {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  color: rgba(255, 255, 255, 0.36);
  scroll-snap-align: center;
  scroll-snap-stop: always;
  font-variant-numeric: tabular-nums;
  font-weight: 300;
  letter-spacing: 0.5px;
  transition: color 140ms ease, font-size 140ms ease, font-weight 140ms ease, letter-spacing 140ms ease;
}
.wheel-item.selected {
  font-size: 30px;
  color: var(--text-primary);
  font-weight: 500;
  letter-spacing: 1px;
}

/* Done toggle row */
.modal-row {
  padding: 8px 20px;
}
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 15px;
  font-weight: 400;
  cursor: pointer;
}
.toggle-row .toggle-label { color: var(--text-primary); letter-spacing: 0.2px; }
.toggle-row input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 30px; height: 30px;
  border-radius: 15px;
  border: 1.5px solid var(--border-stronger);
  background: transparent;
  position: relative;
  margin: 0;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 140ms ease, border-color 140ms ease;
}
.toggle-row input[type="checkbox"]:checked {
  background: var(--done-fill);
  border-color: var(--done-stroke);
}
.toggle-row input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  left: 9px; top: 4px;
  width: 7px; height: 13px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

/* Timer */
.btn-timer {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.06);
  color: var(--text-primary);
  padding: 18px 24px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.3px;
  cursor: pointer;
  width: 100%;
  font-variant-numeric: tabular-nums;
  transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
}
.btn-timer:active:not(:disabled) { background: rgba(255, 255, 255, 0.10); }
.btn-timer.counting {
  background: rgba(255, 169, 64, 0.07);
  border-color: rgba(255, 169, 64, 0.28);
  color: var(--warn);
  font-size: 34px;
  font-weight: 300;
  letter-spacing: 2px;
  padding: 22px 24px;
  cursor: default;
}
.btn-timer:disabled { opacity: 1; }

/* History */
.history-list {
  overflow-y: auto;
  padding: 4px 20px 16px;
  max-height: 60vh;
  -webkit-overflow-scrolling: touch;
}
.history-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 4px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  font-size: 14px;
}
.history-row:last-child { border-bottom: none; }
.history-row .ts { color: var(--text-secondary); font-variant-numeric: tabular-nums; }
.history-row .val {
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  letter-spacing: 0.3px;
}
.history-empty {
  text-align: center;
  color: var(--text-secondary);
  padding: 40px 16px;
  font-size: 14px;
}
.btn-row {
  padding: 12px 20px 4px;
}
.btn-primary {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.06);
  color: var(--text-primary);
  padding: 15px 24px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.3px;
  cursor: pointer;
  width: 100%;
}
.btn-primary:active { background: rgba(255, 255, 255, 0.10); }
</style>
</head>
<body>

<header>GYMLOG</header>

<div class="stage">
  <svg class="floorplan" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 393 600" preserveAspectRatio="xMidYMid meet">

<!-- ============ PICKER SHEET ============ -->
<div class="backdrop" id="picker-backdrop"></div>
<div class="sheet" id="picker-sheet" role="dialog" aria-modal="true" aria-labelledby="picker-title">
  <div class="sheet-handle-area" id="picker-handle-area"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <div class="sheet-title" id="picker-title">Apparaat</div>
    <button class="icon-btn" id="open-history" aria-label="Geschiedenis">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
    </button>
  </div>
  <div class="wheels-row">
    <div class="wheel-wrap" id="wheel1-wrap">
      <div class="wheel-label">Gewicht</div>
      <div class="wheel-container"><div class="wheel" id="wheel1"></div></div>
    </div>
    <div class="wheel-wrap" id="wheel2-wrap">
      <div class="wheel-label">Plus</div>
      <div class="wheel-container"><div class="wheel" id="wheel2"></div></div>
    </div>
  </div>
  <div class="modal-row">
    <label class="toggle-row" for="done-toggle">
      <span class="toggle-label">Vandaag gedaan</span>
      <input type="checkbox" id="done-toggle">
    </label>
  </div>
  <div class="modal-row">
    <button class="btn-timer" id="timer-btn" type="button">Start rust</button>
  </div>
</div>

<!-- ============ HISTORY SHEET ============ -->
<div class="backdrop" id="history-backdrop"></div>
<div class="sheet" id="history-sheet" role="dialog" aria-modal="true" aria-labelledby="history-title">
  <div class="sheet-handle-area" id="history-handle-area"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <div class="sheet-title" id="history-title">Geschiedenis</div>
    <div style="width:36px"></div>
  </div>
  <div class="history-list" id="history-list"></div>
  <div class="btn-row">
    <button class="btn-primary" id="history-close">Sluiten</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== Config =====
  const DEVICES = {
    1: 'Chest press',
    2: 'Abdominal',
    3: 'Leg press',
    4: 'Back extension',
    5: 'Row',
    6: 'Pulldown',
    7: 'Torso',
    8: 'Arm curl',
    9: 'Leg ext'
  };
  const WHEEL1_VALUES = [30, 50, 70, 90, 110, 130, 150, 170];
  const WHEEL2_VALUES = [0, 5, 10, 15];
  const ITEM_HEIGHT = 40;
  const HISTORY_WINDOW_MS = 90 * 24 * 60 * 60 * 1000; // 3 maanden
  const REST_SECONDS = 60;

  // ===== Storage =====
  const STORE = {
    getCurrent(id) {
      try {
        const v = JSON.parse(localStorage.getItem('current_' + id));
        if (v && typeof v.wheel1 === 'number' && typeof v.wheel2 === 'number') return v;
      } catch (e) {}
      return { wheel1: WHEEL1_VALUES[0], wheel2: 0 };
    },
    setCurrent(id, val) {
      localStorage.setItem('current_' + id, JSON.stringify(val));
    },
    getHistory(id) {
      try {
        const v = JSON.parse(localStorage.getItem('history_' + id));
        if (Array.isArray(v)) return v;
      } catch (e) {}
      return [];
    },
    addHistory(id, entry) {
      const h = this.getHistory(id);
      h.push(entry);
      localStorage.setItem('history_' + id, JSON.stringify(h));
    },
    getDoneDate(id) {
      return localStorage.getItem('done_' + id);
    },
    setDoneDate(id, dateStr) {
      if (dateStr) localStorage.setItem('done_' + id, dateStr);
      else localStorage.removeItem('done_' + id);
    }
  };

  // ===== Today =====
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' +
           String(d.getMonth() + 1).padStart(2, '0') + '-' +
           String(d.getDate()).padStart(2, '0');
  }
  function isDoneToday(id) {
    return STORE.getDoneDate(id) === todayStr();
  }

  // ===== Audio (Web Audio API) =====
  let audioCtx = null;
  function getAudioCtx() {
    if (audioCtx) return audioCtx;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    } catch (e) {}
    return audioCtx;
  }
  function unlockAudio() {
    const ctx = getAudioCtx();
    if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
  }
  function playTick() {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 1400;
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 0.004);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
    osc.start(now);
    osc.stop(now + 0.05);
  }
  function playBeep() {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
    const now = ctx.currentTime;
    function tone(start, dur, freq) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + start);
      gain.gain.linearRampToValueAtTime(0.25, now + start + 0.01);
      gain.gain.setValueAtTime(0.25, now + start + dur - 0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + start + dur);
      osc.start(now + start);
      osc.stop(now + start + dur + 0.02);
    }
    tone(0,    0.18, 880);
    tone(0.22, 0.28, 1175);
  }
  function tinyVibrate() {
    if (navigator.vibrate) {
      try { navigator.vibrate(10); } catch (e) {}
    }
  }

  // ===== Wheel impl =====
  function setSelectedItem(el, idx) {
    if (el._selectedIdx === idx) return;
    el._selectedIdx = idx;
    const items = el.querySelectorAll('.wheel-item');
    items.forEach((item, i) => {
      if (i === idx) item.classList.add('selected');
      else item.classList.remove('selected');
    });
  }
  function buildWheel(el, values, current) {
    el.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'wheel-list';
    values.forEach(v => {
      const item = document.createElement('div');
      item.className = 'wheel-item';
      item.textContent = v;
      list.appendChild(item);
    });
    el.appendChild(list);
    el._values = values;
    let idx = values.indexOf(current);
    if (idx < 0) {
      // current value isn't in the (possibly updated) values list — snap to nearest
      let bestDelta = Infinity;
      values.forEach((v, i) => {
        const d = Math.abs(v - current);
        if (d < bestDelta) { bestDelta = d; idx = i; }
      });
      if (idx < 0) idx = 0;
    }
    const target = idx * ITEM_HEIGHT;
    el._lastIndex = idx;
    el._selectedIdx = -1;
    el._suppressFeedback = true;
    setSelectedItem(el, idx);

    // iOS Safari + scroll-snap-type:y mandatory hijacks programmatic scrollTop
    // right after DOM rewrite (snap points unstable). Disable snap, set position,
    // let layout settle, then re-enable.
    el.style.scrollSnapType = 'none';
    void el.offsetHeight; // force layout
    el.scrollTop = target;

    requestAnimationFrame(() => {
      el.scrollTop = target;
      requestAnimationFrame(() => {
        el.scrollTop = target;
        // Re-enable snap and re-assert exact position
        el.style.scrollSnapType = '';
        el.scrollTop = target;
        setTimeout(() => {
          if (Math.abs(el.scrollTop - target) > 0.5) {
            el.scrollTop = target;
          }
          setSelectedItem(el, idx);
          el._suppressFeedback = false;
        }, 200);
      });
    });
  }
  function getWheelValue(el) {
    if (!el._values) return null;
    const idx = Math.round(el.scrollTop / ITEM_HEIGHT);
    const safe = Math.max(0, Math.min(el._values.length - 1, idx));
    return el._values[safe];
  }
  function attachWheelFeedback(el, wrap) {
    let snapTimer = null;
    el.addEventListener('scroll', () => {
      if (!el._values) return;
      const raw = el.scrollTop / ITEM_HEIGHT;
      const idx = Math.max(0, Math.min(el._values.length - 1, Math.round(raw)));

      // Live update which item shows as selected (always the one closest to the band center)
      setSelectedItem(el, idx);

      // Tactile feedback when selection changes
      if (idx !== el._lastIndex) {
        el._lastIndex = idx;
        if (!el._suppressFeedback) {
          playTick();
          tinyVibrate();
          wrap.classList.remove('pulse');
          void wrap.offsetWidth;
          wrap.classList.add('pulse');
          setTimeout(() => wrap.classList.remove('pulse'), 100);
        }
      }

      // Force exact snap to integer multiple of ITEM_HEIGHT after scroll stops
      clearTimeout(snapTimer);
      snapTimer = setTimeout(() => {
        const target = el._lastIndex * ITEM_HEIGHT;
        if (Math.abs(el.scrollTop - target) > 0.5) {
          el._suppressFeedback = true;
          el.scrollTop = target;
          setTimeout(() => { el._suppressFeedback = false; }, 60);
        }
      }, 130);
    }, { passive: true });
  }

  // ===== Refs =====
  const pickerBackdrop = document.getElementById('picker-backdrop');
  const pickerSheet    = document.getElementById('picker-sheet');
  const pickerTitle    = document.getElementById('picker-title');
  const wheel1         = document.getElementById('wheel1');
  const wheel2         = document.getElementById('wheel2');
  const wheel1Wrap     = document.getElementById('wheel1-wrap');
  const wheel2Wrap     = document.getElementById('wheel2-wrap');
  const doneToggle     = document.getElementById('done-toggle');
  const timerBtn       = document.getElementById('timer-btn');
  const historyBackdrop= document.getElementById('history-backdrop');
  const historySheet   = document.getElementById('history-sheet');
  const historyTitle   = document.getElementById('history-title');
  const historyList    = document.getElementById('history-list');

  let activeDeviceId = null;
  let openedSnapshot = null;
  let timerInterval = null;
  let timerRemaining = REST_SECONDS;

  attachWheelFeedback(wheel1, wheel1Wrap);
  attachWheelFeedback(wheel2, wheel2Wrap);

  // ===== Timer =====
  function resetTimerUI() {
    timerBtn.classList.remove('counting');
    timerBtn.textContent = 'Start rust';
    timerBtn.disabled = false;
  }
  function startTimer() {
    if (timerInterval) return;
    timerRemaining = REST_SECONDS;
    timerBtn.classList.add('counting');
    timerBtn.textContent = timerRemaining + 's';
    timerBtn.disabled = true;
    unlockAudio();
    timerInterval = setInterval(() => {
      timerRemaining -= 1;
      if (timerRemaining <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        playBeep();
        tinyVibrate();
        resetTimerUI();
      } else {
        timerBtn.textContent = timerRemaining + 's';
      }
    }, 1000);
  }
  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    resetTimerUI();
  }
  timerBtn.addEventListener('click', () => {
    if (timerInterval) return;
    startTimer();
  });

  // ===== Done state rendering on floorplan =====
  function renderDoneStates() {
    const today = todayStr();
    document.querySelectorAll('.device').forEach(g => {
      const id = parseInt(g.dataset.id, 10);
      if (STORE.getDoneDate(id) === today) g.classList.add('done');
      else g.classList.remove('done');
    });
  }

  // ===== Picker =====
  function openPicker(id) {
    unlockAudio();
    activeDeviceId = id;
    const cur = STORE.getCurrent(id);
    openedSnapshot = { wheel1: cur.wheel1, wheel2: cur.wheel2 };
    pickerTitle.textContent = DEVICES[id] || ('Apparaat ' + id);
    buildWheel(wheel1, WHEEL1_VALUES, cur.wheel1);
    buildWheel(wheel2, WHEEL2_VALUES, cur.wheel2);
    doneToggle.checked = isDoneToday(id);
    resetTimerUI();
    pickerBackdrop.classList.add('open');
    pickerSheet.classList.add('open');
  }
  function closePicker() {
    if (activeDeviceId === null) return;
    stopTimer();
    const w1 = getWheelValue(wheel1);
    const w2 = getWheelValue(wheel2);
    if (w1 !== null && w2 !== null) {
      const next = { wheel1: w1, wheel2: w2 };
      STORE.setCurrent(activeDeviceId, next);
      if (!openedSnapshot || openedSnapshot.wheel1 !== w1 || openedSnapshot.wheel2 !== w2) {
        STORE.addHistory(activeDeviceId, { ts: Date.now(), wheel1: w1, wheel2: w2 });
      }
    }
    pickerSheet.classList.remove('open');
    pickerBackdrop.classList.remove('open');
    activeDeviceId = null;
    openedSnapshot = null;
  }

  // Done toggle
  doneToggle.addEventListener('change', () => {
    if (activeDeviceId === null) return;
    if (doneToggle.checked) {
      STORE.setDoneDate(activeDeviceId, todayStr());
    } else {
      STORE.setDoneDate(activeDeviceId, null);
    }
    renderDoneStates();
    tinyVibrate();
  });

  // ===== History =====
  function fmtDate(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return pad(d.getDate()) + '-' + pad(d.getMonth()+1) + '-' + d.getFullYear()
         + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function openHistory() {
    if (activeDeviceId === null) return;
    const id = activeDeviceId;
    historyTitle.textContent = (DEVICES[id] || ('Apparaat ' + id)) + ' — geschiedenis';
    const cutoff = Date.now() - HISTORY_WINDOW_MS;
    const filtered = STORE.getHistory(id)
      .filter(h => h && typeof h.ts === 'number' && h.ts >= cutoff)
      .sort((a, b) => b.ts - a.ts);
    historyList.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'history-empty';
      empty.textContent = 'Nog geen wijzigingen in de laatste 3 maanden.';
      historyList.appendChild(empty);
    } else {
      filtered.forEach(h => {
        const row = document.createElement('div');
        row.className = 'history-row';
        const ts = document.createElement('span');
        ts.className = 'ts';
        ts.textContent = fmtDate(h.ts);
        const val = document.createElement('span');
        val.className = 'val';
        val.textContent = h.wheel1 + ' + ' + h.wheel2;
        row.appendChild(ts);
        row.appendChild(val);
        historyList.appendChild(row);
      });
    }
    historyBackdrop.classList.add('open');
    historySheet.classList.add('open');
  }
  function closeHistory() {
    historySheet.classList.remove('open');
    historyBackdrop.classList.remove('open');
  }

  // ===== Wiring =====
  document.querySelectorAll('.device').forEach(g => {
    const id = parseInt(g.dataset.id, 10);
    g.addEventListener('click', () => openPicker(id));
  });
  pickerBackdrop.addEventListener('click', closePicker);
  historyBackdrop.addEventListener('click', closeHistory);
  document.getElementById('history-close').addEventListener('click', closeHistory);
  document.getElementById('open-history').addEventListener('click', openHistory);

  // Swipe-down to close
  function attachSwipeClose(el, closeFn) {
    let startY = null, startT = 0;
    el.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
      startT = Date.now();
    }, { passive: true });
    el.addEventListener('touchend', e => {
      if (startY === null) return;
      const dy = e.changedTouches[0].clientY - startY;
      const dt = Date.now() - startT;
      if (dy > 30 || (dy > 10 && dt < 250)) closeFn();
      startY = null;
    }, { passive: true });
  }
  attachSwipeClose(document.getElementById('picker-handle-area'), closePicker);
  attachSwipeClose(document.getElementById('history-handle-area'), closeHistory);

  // ===== Seed initial values (forced once per seed_version) =====
  const SEED_VERSION = 'v3';
  const SEED = {
    1: { wheel1: 50,  wheel2: 10 },  // Chest press
    2: { wheel1: 110, wheel2: 0  },  // Abdominal
    3: { wheel1: 130, wheel2: 10 },  // Leg press
    4: { wheel1: 130, wheel2: 0  },  // Back extension
    5: { wheel1: 90,  wheel2: 10 },  // Row
    6: { wheel1: 70,  wheel2: 0  },  // Pulldown
    7: { wheel1: 50,  wheel2: 0  },  // Torso
    8: { wheel1: 30,  wheel2: 15 },  // Arm curl
    9: { wheel1: 50,  wheel2: 5  }   // Leg ext
  };
  if (localStorage.getItem('seed_version') !== SEED_VERSION) {
    Object.keys(SEED).forEach(id => {
      STORE.setCurrent(id, SEED[id]);
    });
    localStorage.setItem('seed_version', SEED_VERSION);
  }

  // ===== Midnight reset / refresh =====
  renderDoneStates();
  window.addEventListener('focus', renderDoneStates);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) renderDoneStates();
  });

  // ===== Service worker =====
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
